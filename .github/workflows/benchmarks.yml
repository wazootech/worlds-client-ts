name: Benchmarks

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "benchmarks/**"
      - ".github/workflows/benchmarks.yml"
      - "deno.json"
      - "deno.lock"
      - "src/**"
  schedule:
    - cron: "0 12 * * 1"

jobs:
  bench-regression-smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.14
          cache: true
      - name: Install dependencies
        run: deno install
      - name: Benchmark regression smoke check
        run: deno task bench:check:smoke
        env:
          CI: true

  bench-regression-full:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.14
          cache: true
      - name: Install dependencies
        run: deno install
      - name: Benchmark regression full check
        run: deno task bench:check
        env:
          CI: true
      - name: Upload benchmark output on failure
        if: failure()
        run: deno bench --allow-all --unstable-kv --json benchmarks/ 2>&1 | tee benchmark-output.txt || true
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: benchmark-output
          path: benchmark-output.txt
          if-no-files-found: ignore
