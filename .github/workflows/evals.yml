name: Agent evals

on:
  schedule:
    # Weekly baseline (Monday 06:00 UTC). Requires GOOGLE_GENERATIVE_AI_API_KEY secret.
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      filter:
        description: Eval case filter (Deno-test-like pattern)
        required: false
        default: ""
      trials:
        description: Trials per case (statistical mode)
        required: false
        default: "10"
      min_pass_rate:
        description: Minimum per-case pass rate when trials > 1 (0-1)
        required: false
        default: "0.8"

jobs:
  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Run credentialed agent evals
        env:
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
        run: |
          if [ -z "$GOOGLE_GENERATIVE_AI_API_KEY" ]; then
            echo "GOOGLE_GENERATIVE_AI_API_KEY secret is not configured; skipping live evals."
            exit 0
          fi
          TRIALS="${{ github.event.inputs.trials }}"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            TRIALS="10"
          fi
          if [ -z "$TRIALS" ]; then
            TRIALS="10"
          fi
          MIN_PASS_RATE="${{ github.event.inputs.min_pass_rate }}"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            MIN_PASS_RATE="0.8"
          fi
          ARGS=(--trials "$TRIALS")
          if [ -n "${{ github.event.inputs.filter }}" ]; then
            ARGS+=(--filter "${{ github.event.inputs.filter }}")
          fi
          if [ -n "$MIN_PASS_RATE" ]; then
            ARGS+=(--min-pass-rate "$MIN_PASS_RATE")
          fi
          deno task evals -- "${ARGS[@]}"
